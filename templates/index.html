<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>SENA | Plataforma Nacional</title>
</head>
<body class="bg-gray-100" x-data="{ search: '' }">

    <header class="bg-[#39A900] p-8 text-white shadow-2xl">
        <h1 class="text-3xl font-bold uppercase tracking-wider">SENA | Plataforma Nacional</h1>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid lg:grid-cols-3 gap-8 mt-8">
        <section class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-[#FF7300]">
            <form action="/registrar" method="POST" onsubmit="return validarCorreo()">
                <input name="nombre" required placeholder="Nombre Completo" class="w-full p-3 mb-4 border rounded-xl">
                <input name="correo" id="correo" required type="email" placeholder="Correo (@sena.edu.co)" class="w-full p-3 mb-4 border rounded-xl">
                
                <select name="nivel" class="w-full p-3 mb-4 border rounded-xl">
                    <option value="TECNICO">Técnico</option>
                    <option value="TECNOLOGO">Tecnólogo</option>
                </select>

                <select name="centro" id="centro" class="w-full p-3 mb-4 border rounded-xl" onchange="checkOtro(this.value)">
                    <option value="Servicios Financieros">Servicios Financieros (Bogotá)</option>
                    <option value="CDTI">CDTI (Cali)</option>
                    <option value="OTRO">Otro... ¿Cuál?</option>
                </select>

                <input type="text" name="otro_centro" id="otro_centro" placeholder="Especifique..." class="w-full p-3 mb-4 border rounded-xl hidden">
                <input name="programa" list="progs" placeholder="Programa de formación..." class="w-full p-3 mb-4 border rounded-xl" required>
                <datalist id="progs">
                    <option value="Análisis y Desarrollo de Software (ADSO)">
                    <option value="Gestión Logística">
                </datalist>

                <input name="ficha" type="number" required placeholder="Ficha" class="w-full p-3 mb-4 border rounded-xl">
                <button class="w-full bg-[#39A900] text-white py-4 rounded-xl font-bold hover:scale-105 transition">Registrar</button>
            </form>
        </section>

        <section class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-xl">
            <input x-model="search" placeholder="🔍 Filtrar aprendices..." class="w-full p-3 mb-6 border rounded-xl">
            <table class="w-full text-left">
                <thead><tr class="text-xs uppercase text-gray-500"><th>Nombre</th><th>Ficha</th><th>Acción</th></tr></thead>
                <tbody>
                    {% for est in aprendices %}
                    <tr x-show="'{{ est.nombre }}'.toLowerCase().includes(search.toLowerCase())" class="border-b">
                        <td class="p-4">{{ est.nombre }}</td>
                        <td class="p-4">{{ est.ficha }}</td>
                        <td class="p-4"><a href="/eliminar/{{ est._id }}" class="text-red-500">Eliminar</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>

    <script>
        function checkOtro(v) {
            document.getElementById('otro_centro').classList.toggle('hidden', v !== 'OTRO');
        }
        function validarCorreo() {
            const c = document.getElementById('correo').value;
            if(!c.includes('@sena.edu.co') && !c.includes('@misena.edu.co')) {
                alert("Correo inválido"); return false;
            }
            return true;
        }
    </script>
</body>
</html>
